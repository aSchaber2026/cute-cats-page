<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geschützter Bereich</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; }
  .login-box h1 { color: #2c3e50; font-size: 1.4em; margin-bottom: 8px; }
  .login-box p { color: #7f8c8d; font-size: 0.95em; margin-bottom: 24px; }
  .login-box input[type="password"] { width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s; }
  .login-box input[type="password"]:focus { border-color: #2c3e50; }
  .login-box button { margin-top: 16px; width: 100%; padding: 12px; background: #2c3e50; color: #fff; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .login-box button:hover { background: #34495e; }
  .error { color: #e74c3c; font-size: 0.9em; margin-top: 12px; display: none; }
  #content { display: none; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h1>Keller / Regh GbR</h1>
  <p>Bitte Passwort eingeben</p>
  <form onsubmit="return checkPass()">
    <input type="password" id="pw" placeholder="••••••" autofocus>
    <button type="submit">Öffnen</button>
  </form>
  <div class="error" id="err">Falsches Passwort</div>
</div>

<script>
function checkPass() {
  var p = document.getElementById('pw').value;
  // Simple hash check
  var h = 0;
  for (var i = 0; i < p.length; i++) {
    h = ((h << 5) - h) + p.charCodeAt(i);
    h |= 0;
  }
  if (h === 1479143010) {
    // Redirect to the actual content
    window.location.href = 'tagebuch.html';
    return false;
  }
  document.getElementById('err').style.display = 'block';
  return false;
}
</script>

</body>
</html>
