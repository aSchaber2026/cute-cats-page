<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Cats Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ee9ca7 100%); min-height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .scene { position: relative; width: 100vw; height: 100vh; }

  /* Ground */
  .ground { position: absolute; bottom: 0; width: 100%; height: 30%; background: linear-gradient(to bottom, #7ec850, #5da03a); border-radius: 50% 50% 0 0 / 20% 20% 0 0; }
  .ground::before { content: ''; position: absolute; top: -20px; width: 100%; height: 40px; background: linear-gradient(to bottom, transparent, #7ec850); border-radius: 50%; }

  /* Sun */
  .sun { position: absolute; top: 60px; right: 100px; width: 80px; height: 80px; background: #ffe066; border-radius: 50%; box-shadow: 0 0 40px #ffe066, 0 0 80px rgba(255,224,102,0.4); animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 40px #ffe066, 0 0 80px rgba(255,224,102,0.4); } 50% { box-shadow: 0 0 60px #ffe066, 0 0 120px rgba(255,224,102,0.5); } }

  /* Clouds */
  .cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.8; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
  .c1 { width: 120px; height: 40px; top: 80px; left: 10%; animation: drift 25s linear infinite; }
  .c1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
  .c1::after { width: 40px; height: 40px; top: -20px; left: 60px; }
  .c2 { width: 100px; height: 35px; top: 140px; left: 40%; animation: drift 30s linear infinite reverse; }
  .c2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
  .c2::after { width: 35px; height: 35px; top: -18px; left: 50px; }
  @keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(calc(100vw + 200px)); } }

  /* Butterflies */
  .butterfly { position: absolute; font-size: 24px; animation: flutter 8s ease-in-out infinite; }
  .b1 { top: 35%; left: 20%; animation-delay: 0s; }
  .b2 { top: 25%; left: 60%; animation-delay: -3s; font-size: 18px; }
  .b3 { top: 45%; left: 75%; animation-delay: -5s; font-size: 20px; }
  @keyframes flutter { 0% { transform: translate(0,0) rotate(0deg); } 25% { transform: translate(30px,-20px) rotate(10deg); } 50% { transform: translate(-10px,-40px) rotate(-5deg); } 75% { transform: translate(-30px,-10px) rotate(5deg); } 100% { transform: translate(0,0) rotate(0deg); } }

  /* Flowers */
  .flowers { position: absolute; bottom: 22%; width: 100%; }
  .flower { position: absolute; font-size: 28px; }

  /* === CATS === */
  .cat { position: absolute; bottom: 26%; }

  /* Cat 1 - Orange tabby, sitting */
  .cat1 { left: 15%; }
  .cat-body1 { width: 70px; height: 55px; background: #f4a940; border-radius: 50% 50% 45% 45%; position: relative; }
  .cat-body1::before { content: ''; position: absolute; top: -28px; left: 10px; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 30px solid #f4a940; }
  .cat-body1::after { content: ''; position: absolute; top: -28px; right: 10px; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 30px solid #f4a940; }
  .face1 { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 50px; height: 35px; }
  .face1 .eyes { position: relative; top: 8px; display: flex; justify-content: center; gap: 14px; }
  .face1 .eye { width: 8px; height: 8px; background: #333; border-radius: 50%; animation: blink1 4s ease-in-out infinite; }
  @keyframes blink1 { 0%,45%,55%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
  .face1 .nose { width: 6px; height: 4px; background: #e88; border-radius: 50%; margin: 4px auto 0; }
  .tail1 { position: absolute; bottom: 5px; right: -20px; width: 40px; height: 8px; background: #f4a940; border-radius: 0 10px 10px 0; transform-origin: left center; animation: wag 2s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(15deg); } }
  .stripes1 { position: absolute; top: 8px; left: 15px; }
  .stripes1 div { width: 40px; height: 3px; background: #d48920; border-radius: 2px; margin-bottom: 6px; }

  /* Cat 2 - Gray, playing with yarn */
  .cat2 { left: 42%; bottom: 24%; }
  .cat-body2 { width: 80px; height: 50px; background: #888; border-radius: 50% 50% 40% 40%; position: relative; transform: rotate(-15deg); }
  .cat-body2::before { content: ''; position: absolute; top: -25px; left: 12px; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 27px solid #888; }
  .cat-body2::after { content: ''; position: absolute; top: -25px; right: 12px; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 27px solid #888; }
  .face2 { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); }
  .face2 .eyes { display: flex; gap: 12px; }
  .face2 .eye { width: 7px; height: 7px; background: #333; border-radius: 50%; }
  .face2 .nose { width: 5px; height: 4px; background: #e88; border-radius: 50%; margin: 3px auto 0; }
  .yarn { position: absolute; bottom: -5px; left: -15px; width: 25px; height: 25px; background: #e74c3c; border-radius: 50%; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2); }
  .yarn::after { content: ''; position: absolute; top: -8px; right: -10px; width: 20px; height: 2px; background: #e74c3c; border-radius: 1px; transform: rotate(30deg); }
  /* Paw reaching for yarn */
  .paw2 { position: absolute; bottom: -2px; left: -5px; width: 18px; height: 10px; background: #888; border-radius: 50%; animation: reach 1.5s ease-in-out infinite; }
  @keyframes reach { 0%,100% { transform: translateX(0) rotate(0); } 50% { transform: translateX(-8px) rotate(-10deg); } }
  .tail2 { position: absolute; bottom: 10px; right: -18px; width: 35px; height: 7px; background: #888; border-radius: 0 8px 8px 0; animation: wag2 1.8s ease-in-out infinite; }
  @keyframes wag2 { 0%,100% { transform: rotate(10deg); } 50% { transform: rotate(-20deg); } }

  /* Cat 3 - Black cat, stretching — THE SECRET TRIGGER */
  .cat3 { right: 15%; bottom: 25%; }
  .cat-body3 { width: 90px; height: 45px; background: #333; border-radius: 50% 50% 40% 40%; position: relative; }
  .cat-body3::before { content: ''; position: absolute; top: -22px; left: 15px; width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 24px solid #333; }
  .cat-body3::after { content: ''; position: absolute; top: -22px; right: 15px; width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 24px solid #333; }
  .face3 { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); }
  .face3 .eyes { display: flex; gap: 14px; }
  .face3 .eye { width: 8px; height: 8px; background: #7bed5e; border-radius: 50%; box-shadow: 0 0 4px #7bed5e; }
  .face3 .eye .pupil { width: 3px; height: 7px; background: #111; border-radius: 50%; margin: 0 auto; margin-top: 0.5px; }
  .face3 .nose { width: 5px; height: 4px; background: #e88; border-radius: 50%; margin: 3px auto 0; }
  .tail3 { position: absolute; bottom: 15px; left: -22px; width: 40px; height: 7px; background: #333; border-radius: 10px 0 0 10px; transform-origin: right center; animation: wag3 3s ease-in-out infinite; }
  @keyframes wag3 { 0%,100% { transform: rotate(15deg) scaleX(1); } 50% { transform: rotate(-10deg) scaleX(1.1); } }

  /* THE SECRET PAWN - clickable! */
  .secret-paw {
    position: absolute; bottom: -8px; right: 10px; width: 22px; height: 14px;
    background: #333; border-radius: 50% 50% 40% 40%; cursor: pointer;
    transition: transform 0.2s; z-index: 5;
  }
  .secret-paw::before { content: ''; position: absolute; top: -2px; left: 2px; width: 5px; height: 5px; background: #444; border-radius: 50%; }
  .secret-paw::after { content: ''; position: absolute; top: -2px; right: 2px; width: 5px; height: 5px; background: #444; border-radius: 50%; }
  .secret-paw:hover { transform: scale(1.15); }
  .secret-paw .pad { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 8px; height: 6px; background: #555; border-radius: 50%; }
  .paw-anim { animation: pawlift 2.5s ease-in-out infinite; }
  @keyframes pawlift { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-8deg) translateY(-3px); } }

  /* Hidden overlay */
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(6px); }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); width: 300px; text-align: center; position: relative; animation: pop 0.3s ease-out; }
  @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .close { position: absolute; top: 10px; right: 14px; font-size: 1.3em; color: #aaa; cursor: pointer; background: none; border: none; }
  .modal .close:hover { color: #555; }
  .modal .cat-icon { font-size: 2.5em; margin-bottom: 8px; }
  .modal input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; text-align: center; outline: none; margin-top: 8px; }
  .modal input:focus { border-color: #333; }
  .modal button { margin-top: 12px; width: 100%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer; }
  .modal button:hover { background: #555; }
  .modal .err { color: #e74c3c; font-size: 0.85em; margin-top: 8px; display: none; }

  /* Small text bottom */
  .footer { position: absolute; bottom: 8px; width: 100%; text-align: center; font-size: 0.75em; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div class="scene">
  <!-- Sky elements -->
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="butterfly b1">🦋</div>
  <div class="butterfly b2">🦋</div>
  <div class="butterfly b3">🦋</div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Flowers -->
  <div class="flowers">
    <span class="flower" style="left:5%;bottom:0">🌸</span>
    <span class="flower" style="left:12%;bottom:5px;font-size:22px">🌼</span>
    <span class="flower" style="left:30%;bottom:2px">🌷</span>
    <span class="flower" style="left:50%;bottom:8px;font-size:24px">🌻</span>
    <span class="flower" style="left:68%;bottom:0">🌸</span>
    <span class="flower" style="left:85%;bottom:4px;font-size:22px">🌼</span>
    <span class="flower" style="left:92%;bottom:0">🌷</span>
  </div>

  <!-- Cat 1: Orange tabby -->
  <div class="cat cat1">
    <div class="cat-body1">
      <div class="stripes1"><div></div><div></div><div></div></div>
      <div class="face1">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="nose"></div>
      </div>
      <div class="tail1"></div>
    </div>
  </div>

  <!-- Cat 2: Gray, playing with yarn -->
  <div class="cat cat2">
    <div class="cat-body2">
      <div class="face2">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="nose"></div>
      </div>
      <div class="paw2"></div>
      <div class="tail2"></div>
    </div>
    <div class="yarn"></div>
  </div>

  <!-- Cat 3: Black cat with SECRET PAW -->
  <div class="cat cat3">
    <div class="cat-body3">
      <div class="face3">
        <div class="eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>
        <div class="nose"></div>
      </div>
      <div class="tail3"></div>
      <div class="secret-paw paw-anim" id="trigger">
        <div class="pad"></div>
      </div>
    </div>
  </div>

  <div class="footer">just some cats</div>
</div>

<!-- Hidden login overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="close">&times;</button>
    <div class="cat-icon">🐾</div>
    <form onsubmit="return k()">
      <input type="password" id="q" placeholder="Miau?" autofocus>
      <button type="submit">OK</button>
    </form>
    <div class="err" id="e">Nope.</div>
  </div>
</div>

<script>
document.getElementById('trigger').addEventListener('click',function(ev){
  ev.stopPropagation();
  document.getElementById('overlay').classList.add('show');
  setTimeout(function(){document.getElementById('q').focus();},100);
});
document.getElementById('close').addEventListener('click',function(){
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click',function(ev){
  if(ev.target===this)this.classList.remove('show');
});
function k(){
  var p=document.getElementById('q').value,h=0;
  for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}
  if(h===965263892){window.location.href='tagebuch.html';return false;}
  document.getElementById('e').style.display='block';
  setTimeout(function(){document.getElementById('e').style.display='none';},2000);
  return false;
}
</script>

</body>
</html>
